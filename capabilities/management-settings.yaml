naftiko: 1.0.0-alpha2
info:
  label: Golioth Management API — Device Settings
  description: Golioth Management API — Device Settings. Manage cloud-controlled settings that devices subscribe to. Self-contained Naftiko capability.
  tags:
    - Golioth
    - Settings
    - Configuration
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      GOLIOTH_API_KEY: GOLIOTH_API_KEY
capability:
  consumes:
    - type: http
      namespace: management-settings
      baseUri: https://api.golioth.io
      description: Golioth Management API — Device Settings business capability.
      resources:
        - name: v1-settings
          path: /v1/projects/{projectId}/settings
          operations:
            - name: listSettings
              method: GET
              description: Golioth List Settings
              outputRawFormat: json
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: createSetting
              method: POST
              description: Golioth Create Setting
              outputRawFormat: json
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                - name: body
                  in: body
                  type: object
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: v1-settings-by-id
          path: /v1/projects/{projectId}/settings/{settingId}
          operations:
            - name: updateSetting
              method: PUT
              description: Golioth Update Setting
              outputRawFormat: json
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                - name: settingId
                  in: path
                  type: string
                  required: true
                - name: body
                  in: body
                  type: object
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: deleteSetting
              method: DELETE
              description: Golioth Delete Setting
              outputRawFormat: json
              inputParameters:
                - name: projectId
                  in: path
                  type: string
                  required: true
                - name: settingId
                  in: path
                  type: string
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
      authentication:
        type: apikey
        key: x-api-key
        value: '{{env.GOLIOTH_API_KEY}}'
        placement: header
  exposes:
    - type: mcp
      namespace: management-settings-mcp
      port: 9090
      transport: http
      description: MCP adapter for Golioth Device Settings capability.
      tools:
        - name: golioth-list-settings
          description: Golioth List Settings
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: management-settings.listSettings
          with:
            projectId: tools.projectId
          outputParameters:
            - type: object
              mapping: $.
        - name: golioth-create-setting
          description: Golioth Create Setting
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: management-settings.createSetting
          with:
            projectId: tools.projectId
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: golioth-update-setting
          description: Golioth Update Setting
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: management-settings.updateSetting
          with:
            projectId: tools.projectId
            settingId: tools.settingId
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: golioth-delete-setting
          description: Golioth Delete Setting
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: management-settings.deleteSetting
          with:
            projectId: tools.projectId
            settingId: tools.settingId
          outputParameters:
            - type: object
              mapping: $.

naftiko: 1.0.0-alpha2
info:
  label: Golioth Management API — Pipelines
  description: Golioth Management API — Pipelines. Manage Pipelines that filter, transform, and forward device data to downstream destinations. Self-contained Naftiko capability.
  tags:
    - Golioth
    - Pipelines
    - Data Routing
    - Integration
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      GOLIOTH_API_KEY: GOLIOTH_API_KEY
capability:
  consumes:
    - type: http
      namespace: management-pipelines
      baseUri: https://api.golioth.io
      description: Golioth Management API — Pipelines business capability.
      resources:
        - name: v1-pipelines
          path: /v1/organizations/{organizationId}/projects/{projectId}/pipelines
          operations:
            - name: listPipelines
              method: GET
              description: Golioth List Pipelines
              outputRawFormat: json
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
                - name: projectId
                  in: path
                  type: string
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: createPipeline
              method: POST
              description: Golioth Create Pipeline
              outputRawFormat: json
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
                - name: projectId
                  in: path
                  type: string
                  required: true
                - name: body
                  in: body
                  type: object
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: v1-pipelines-by-id
          path: /v1/organizations/{organizationId}/projects/{projectId}/pipelines/{pipelineId}
          operations:
            - name: getPipeline
              method: GET
              description: Golioth Get Pipeline
              outputRawFormat: json
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
                - name: projectId
                  in: path
                  type: string
                  required: true
                - name: pipelineId
                  in: path
                  type: string
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: updatePipeline
              method: PATCH
              description: Golioth Update Pipeline
              outputRawFormat: json
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
                - name: projectId
                  in: path
                  type: string
                  required: true
                - name: pipelineId
                  in: path
                  type: string
                  required: true
                - name: body
                  in: body
                  type: object
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: deletePipeline
              method: DELETE
              description: Golioth Delete Pipeline
              outputRawFormat: json
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
                - name: projectId
                  in: path
                  type: string
                  required: true
                - name: pipelineId
                  in: path
                  type: string
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
      authentication:
        type: apikey
        key: x-api-key
        value: '{{env.GOLIOTH_API_KEY}}'
        placement: header
  exposes:
    - type: mcp
      namespace: management-pipelines-mcp
      port: 9090
      transport: http
      description: MCP adapter for Golioth Pipelines capability.
      tools:
        - name: golioth-list-pipelines
          description: Golioth List Pipelines
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: management-pipelines.listPipelines
          with:
            organizationId: tools.organizationId
            projectId: tools.projectId
          outputParameters:
            - type: object
              mapping: $.
        - name: golioth-create-pipeline
          description: Golioth Create Pipeline
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: management-pipelines.createPipeline
          with:
            organizationId: tools.organizationId
            projectId: tools.projectId
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: golioth-get-pipeline
          description: Golioth Get Pipeline
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: management-pipelines.getPipeline
          with:
            organizationId: tools.organizationId
            projectId: tools.projectId
            pipelineId: tools.pipelineId
          outputParameters:
            - type: object
              mapping: $.
        - name: golioth-update-pipeline
          description: Golioth Update Pipeline
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: management-pipelines.updatePipeline
          with:
            organizationId: tools.organizationId
            projectId: tools.projectId
            pipelineId: tools.pipelineId
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: golioth-delete-pipeline
          description: Golioth Delete Pipeline
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: management-pipelines.deletePipeline
          with:
            organizationId: tools.organizationId
            projectId: tools.projectId
            pipelineId: tools.pipelineId
          outputParameters:
            - type: object
              mapping: $.
